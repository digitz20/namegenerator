<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Generator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        .container {
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
            max-width: 800px;
            margin: 0 auto;
        }
        textarea {
            width: 100%;
            height: 150px;
            margin-bottom: 10px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            box-sizing: border-box;
        }
        button {
            padding: 10px 15px;
            margin-right: 10px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #0056b3;
        }
        #emailList {
            margin-top: 20px;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }
        .email-item {
            background-color: #e9ecef;
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            word-wrap: break-word;
        }
        .email-item.sent {
            background-color: #d4edda;
            color: #155724;
        }
        .email-item.sending {
            background-color: #fff3cd;
            color: #856404;
        }
        .email-item button {
            float: right;
            margin-left: 5px;
            background-color: #dc3545;
        }
        .email-item button:hover {
            background-color: #c82333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Email Generator</h1>
        <textarea id="inputText" placeholder="Paste your text here..."></textarea>
        <button id="processText">Process Text</button>
        <button id="copyAll">Copy All Emails</button>
        <button id="deleteAll">Delete All Emails</button>
        <div id="emailList">
            <h2>Generated Emails</h2>
            <p id="noEmailsMessage">No emails generated yet.</p>
        </div>
    </div>

    <script src="compromise.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
