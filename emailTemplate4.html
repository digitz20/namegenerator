<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Order Confirmation</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }
        .container {
            width: 100%;
            max-width: 600px;
            margin: 0 auto;
            background-color: #ffffff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 10, 0.1);
        }
        .header {
            background-color: #007bff; /* Blue header for order confirmation */
            color: #ffffff;
            padding: 10px 0;
            text-align: center;
            border-radius: 8px 8px 0 0;
        }
        .content {
            padding: 20px;
            text-align: left;
        }
        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #888888;
            text-align: center;
        }
        .button {
            display: inline-block;
            background-color: #007bff;
            color: #ffffff;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Order Confirmation</h1>
        </div>
        <div class="content">
            <p>Hello {{firstName}},</p>
            <p>Your order #{{orderId}} has been successfully placed and confirmed!</p>
            <p>We'll send you another email when your order ships.</p>
            <a href="https://yourwebsite.com/my-orders/{{orderId}}" class="button">View Order Status</a>
            <p>Best Regards,</p>
            <p>Our Team</p>
            <p><small>Sent to: {{firstName}}</small></p>
            <p><small>Sent on: {{timestamp}}</small></p>
        </div>
    </div>
</body>
</html>
